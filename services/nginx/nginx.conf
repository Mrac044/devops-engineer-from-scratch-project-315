server {
    listen 80;
    server_name bulletin-board.servebeer.com;
    
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bulletin-board.servebeer.com;

    ssl_certificate /etc/letsencrypt/live/bulletin-board.servebeer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bulletin-board.servebeer.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    root /app/public;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://bulletin-board-app:8080;
    }
}