---
# tasks file for deploy

- name: Create log directory
  ansible.builtin.file:
    owner: "{{ ansible_user }}"
    path: "{{ app_log_dir }}"
    state: directory
    mode: "0755"

- name: Download docker image
  community.docker.docker_image_pull:
    name: "{{ image_name }}"
    pull: "always"
    tag: "{{ app_version }}"
  register: pull_result

- name: Create docker network
  community.docker.docker_network:
    name: "bulletin-net"

- name: Start docker container db
  community.docker.docker_container:
    name: "bulletin-board-db"
    image: "postgres:16"
    state: started
    restart_policy: always
    networks:
      - name: bulletin-net
    env:
      POSTGRES_DB: "bulletins"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "{{ db_password }}"
    volumes:
      - "/var/lib/bulletin_board_db:/var/lib/postgresql/data"

- name: Start docker container app
  community.docker.docker_container:
    name: "bulletin-board-app"
    image: "{{ image_name }}:{{ app_version }}"
    state: started
    force_kill: yes
    restart_policy: always
    networks:
      - name: "bulletin-net"
    volumes:
      - "{{ app_log_dir }}:/app/logs"
    restart: "{{ pull_result.changed }}"
    env:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://bulletin-board-db:5432/bulletins"
      SPRING_PROFILES_ACTIVE: "prod"
      MANAGEMENT_SERVER_PORT: "9090"
      SPRING_DATASOURCE_PASSWORD: "{{ db_password }}"
      STORAGE_S3_ACCESSKEY: "{{ s3_id }}"
      STORAGE_S3_SECRETKEY: "{{ s3_secret_key }}"
      STORAGE_S3_BUCKET: "{{ s3_bucket }}"
      STORAGE_S3_REGION: "{{ s3_region }}"
      STORAGE_S3_ENDPOINT: "{{ s3_endpoint }}"

- name: Create frontend directory
  ansible.builtin.file:
    owner: "{{ ansible_user }}"
    path: "{{ frontend_dir }}/bulletin-board"
    state: directory
    mode: "0755"

- name: Copy frontend
  ansible.builtin.copy:
    src: "./frontend/dist/"
    dest: "{{ frontend_dir }}/bulletin-board/"

- name: Create nginx etc directory
  ansible.builtin.file:
    owner: root
    group: root
    path: "/etc/nginx"
    state: directory
    mode: "0755"
  become: yes

- name: Update nginx configuration
  ansible.builtin.copy:
    src: "./services/nginx/nginx.conf"
    dest: "{{ nginx_conf_path }}"
    mode: "0644"
    owner: root
    group: root
  become: yes
  notify:
    - Restart nginx container

- name: Start docker container nginx reverse proxy
  community.docker.docker_container:
    name: "bulletin-board-nginx"
    image: "nginx:latest"
    state: started
    restart_policy: always
    networks: 
      - name: "bulletin-net"
    published_ports:
      - "80:80"
      - "443:443"
    volumes:
      - "{{ nginx_conf_path }}:/etc/nginx/conf.d/default.conf"
      - "{{ frontend_dir }}/bulletin-board:/app/public"
      - "/etc/letsencrypt:/etc/letsencrypt:ro"

- name: Generate certificate
  import_role:
    name: "geerlingguy.certbot"
  vars:
    certbot_admin_email: "{{ admin_email }}"
    certbot_create_method: webroot
    certbot_create_if_missing: yes
    certbot_certs:
      - domains:
          - "bulletin-board.servebeer.com"
        webroot: "{{ frontend_dir }}/bulletin-board"
    certbot_auto_renew_options: "--quiet --post-hook 'docker restart bulletin-board-nginx'"
  become: yes