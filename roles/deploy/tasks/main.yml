---
# tasks file for deploy

- name: Create log directory
  ansible.builtin.file:
    owner: "{{ ansible_user }}"
    path: "{{ app_log_dir }}"
    state: directory
    mode: "0755"

- name: Download docker image
  community.docker.docker_image_pull:
    name: "{{ image_name }}"
    pull: "always"
    tag: "{{ app_version }}"
  register: pull_result

- name: Create docker network
  community.docker.docker_network:
    name: "bulletin-net"

- name: Start docker container db
  community.docker.docker_container:
    name: "bulletin-board-db"
    image: "postgres:16"
    state: started
    restart_policy: always
    networks:
      - name: bulletin-net
    env:
      POSTGRES_DB: "bulletins"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "{{ db_password }}"
    volumes:
      - "/var/lib/bulletin_board_db:/var/lib/postgresql/data"

- name: Start docker container app
  community.docker.docker_container:
    name: "bulletin-board-app"
    image: "{{ image_name }}:{{ app_version }}"
    state: started
    force_kill: yes
    restart_policy: always
    published_ports:
      - "8080:8080" 
      - "9090:9090"
    networks:
      - name: bulletin-net
    volumes:
      - "{{ app_log_dir }}:/app/logs"
    restart: "{{ pull_result.changed }}"
    env:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://bulletin-board-db:5432/bulletins"
      SPRING_PROFILES_ACTIVE: "prod"
      MANAGEMENT_SERVER_PORT: "9090"
      SPRING_DATASOURCE_PASSWORD: "{{ db_password }}"
      STORAGE_S3_ACCESSKEY: "{{ s3_id }}"
      STORAGE_S3_SECRETKEY: "{{ s3_secret_key }}"
      STORAGE_S3_BUCKET: "{{ s3_bucket }}"
      STORAGE_S3_REGION: "{{ s3_region }}"
      STORAGE_S3_ENDPOINT: "{{ s3_endpoint }}"